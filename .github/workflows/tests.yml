name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies (validates requirements floor)
        run: pip install -r requirements.txt
      - name: Run offline unit tests (no API key needed)
        run: python -m unittest discover tests -v
